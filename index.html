  <!-- 발자국 트레일 효과 -->
  <script>
  (function() {
    const PAW_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="20" viewBox="0 0 28 32"><ellipse cx="14" cy="22" rx="7.5" ry="7" fill="currentColor"/><circle cx="7" cy="11" r="3.5" fill="currentColor"/><circle cx="14" cy="7" r="3" fill="currentColor"/><circle cx="21" cy="11" r="3.5" fill="currentColor"/></svg>`;
    let lastX = 0, lastY = 0, stepCount = 0;
    const MIN_DIST = 60;

    document.addEventListener('mousemove', function(e) {
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < MIN_DIST) return;

      lastX = e.clientX;
      lastY = e.clientY;
      stepCount++;

      const paw = document.createElement('div');
      paw.innerHTML = PAW_SVG;
      paw.style.cssText = `
        position:fixed; z-index:9998; pointer-events:none;
        left:${e.clientX - 9}px; top:${e.clientY - 10}px;
        color:rgba(0,0,0,0.25);
        transform:rotate(${(stepCount % 2 === 0 ? -15 : 15) + Math.atan2(dy, dx) * (180/Math.PI) - 90}deg);
        opacity:1;
        transition:opacity 1.5s ease 0.3s;
      `;
      document.body.appendChild(paw);

      requestAnimationFrame(() => { paw.style.opacity = '0'; });
      setTimeout(() => paw.remove(), 2000);
    });
  })();
  </script>
